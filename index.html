<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1 class="main_title">Выбери свой продукт</h1>
    <div class="btn_section">
      <button id="recolor-first-card-btn">Первая карточка</button>
      <button id="recolor-all-cards-btn">Все карточки</button>
      <button id="open-google-btn">Открыть Google</button>
      <button id="recolor-himself-btn">Нажми на меня!</button>
    </div>

    <section id="cards-section" class="cards_section"></section>

    <template id="card-template">
      <article class="card card-name">
        <img class="img-card" src="" />
        <div class="card-content">
          <h2>для нормальной кожи</h2>
          <h3><strong class="title"></strong></h3>
          <p class="description"></p>
          <span>Состав:</span>
          <ul>
            <li class="firstIngredient"></li>
            <li class="secondIngredient"></li>
            <li class="thirdIngredient"></li>
          </ul>
          <div class="price">
            <span>Цена</span>
            <p class="priceP"></p>
          </div>
        </div>
      </article>
    </template>

    <script src="homework-5.js"></script>
    <script src="homework-6.js"></script>
    <script src="homework-7.js"></script>
    <script src="homework-8.js" type="module"></script>

    <script src="script.js"></script>
  </body>
</html>
